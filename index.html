<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR L CELL - Multi Struk Pro</title>
    <style>
      :root { --primary: #4f46e5; --bg: #f8fafc; }
      body { background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; color: #333; }
      .container { max-width: 800px; margin: 0 auto; }
      .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
      h1 { text-align: center; color: var(--primary); margin-top: 0; font-size:30px;}
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      input, select, button { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
      label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 4px; display: block; }
      .full { grid-column: 1 / -1; }
      
      .upload-btn { 
          background: var(--primary); color: white; font-weight: bold; 
          text-align: center; padding: 15px; border-radius: 8px; 
          display: block; position: relative; overflow: hidden; cursor: pointer;
      }
      #imageInput {
          position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          opacity: 0; cursor: pointer; font-size: 100px;
      }

      #struk-container { 
          background: #fff;
          padding: 5px;
          font-family: 'Courier New', Courier, monospace;
          line-height: 1.2;
          width: 52mm;
          max-width: 52mm;
          margin: 20px auto;
          color: #000;
      }
      .line { border-top: 1px dashed #000; margin: 8px 0; }
      .text-center { text-align: center; }
      .flex-space { display: flex; justify-content: center; }

      .btn-group { display: flex; gap: 10px; margin-top: 20px; }
      .btn-print { background: #10b981; color: white; border: none; font-weight: bold; }
      .btn-download { background: #f59e0b; color: white; border: none; font-weight: bold; }

      /* ⟹ PERBAIKAN UTAMA: Hilangkan margin + outline browser */
      @page {
          size: 58mm auto;
          margin: 0;
          padding: 0;
      }

      @media print {
          /* Hilangkan semua elemen kecuali struk */
          body, .container, .card, .no-print { 
              display: none !important; 
          }
          
          body { 
              margin: 0 !important;
              padding: 0 !important;
              background: white !important;
          }
          
          .container { 
              max-width: none !important;
              margin: 0 !important;
              padding: 0 !important;
              display: block !important;
          }
          
          #struk-container { 
              position: absolute !important; 
              left: 0 !important; 
              top: 0 !important; 
              width: 52mm !important;
              max-width: 52mm !important;
              margin: 0 !important;
              padding: 0 !important;
              background: white !important;
              border: none !important;
              outline: none !important;
              box-shadow: none !important;
              border-radius: 0 !important;
          }
          
          #struk-container * {
              border: none !important;
              outline: none !important;
              box-shadow: none !important;
          }
      }
    </style>
  </head>
  <body>

  <div class="container">
    <div class="card no-print">
      <h1>📸 SCAN STRUK L CELL</h1>
      <div class="upload-btn">
        KLIK UNTUK FOTO / UPLOAD STRUK
        <input type="file" id="imageInput" accept="image/*" enctype="multipart/form-data">
      </div>
      <div id="status" style="text-align:center; margin-top:10px; font-weight:bold; color:var(--primary);"></div>
    </div>

    <div class="card no-print">
      <div class="grid" id="editForm">
        <div class="full">
          <label>Tipe Struk</label>
          <select id="f_tipe" onchange="updateUI()">
            <option value="BCA">BCA Transfer</option>
            <option value="GOPAY">GoPay / Topup</option>
            <option value="PLN">PLN (Token/Tagihan)</option>
          </select>
        </div>
        <div>
          <label>Tanggal & Waktu</label>
          <input type="text" id="f_waktu" oninput="sync()">
        </div>
        <div>
          <label id="label_bank">Bank Tujuan / Provider</label>
          <input type="text" id="f_bank" oninput="sync()">
        </div>
        <div class="full">
          <label id="label_nama">Nama Penerima / Pelanggan</label>
          <input type="text" id="f_nama" oninput="sync()">
        </div>
        <div class="full">
          <label id="label_tujuan">No. Rek / ID Pelanggan</label>
          <input type="text" id="f_tujuan" oninput="sync()">
        </div>
        <div class="full" id="box_token" style="display:none;">
          <label style="color: #4f46e5; font-weight: bold;">NOMOR TOKEN (20 DIGIT)</label>
          <input type="text" id="f_token" oninput="sync()" placeholder="0000 0000 0000 0000 0000">
        </div>
        <div>
          <label>Nominal (Pokok)</label>
          <input type="number" id="f_nominal" oninput="hitungTotal()">
        </div>
        <div>
          <label>Biaya Admin</label>
          <input type="number" id="f_admin" oninput="hitungTotal()">
        </div>
        <div class="full">
          <label>Total Pembayaran</label>
          <input type="text" id="f_total" readonly style="background:#f1f5f9; font-weight:bold;">
        </div>
        <div class="full">
          <label>ID Transaksi / Ref No.</label>
          <input type="text" id="f_idtrx" oninput="sync()">
        </div>
      </div>
      
      <div class="btn-group">
          <button class="btn-print" onclick="window.print()">🖨️ CETAK STRUK</button>
          <button class="btn-download" onclick="downloadStruk()">📥 DOWNLOAD GAMBAR</button>
      </div>
    </div>

    <div id="struk-container">
      <div class="text-center">
        <strong style="font-size:20px;">L CELL</strong><br>
        <small>Bukti Transaksi Digital</small>
      </div>
      <div class="line"></div>
      <div id="p_konten"></div>
      <div class="line"></div>
      <div class="text-center">
        <strong>TERIMA KASIH</strong><br>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
  let data = { tipe: 'BCA', nama: '-', tujuan: '-', bank: '-', nominal: 0, admin: 3000, total: 0, waktu: '', idtrx: '-', token: '' };

  function downloadStruk() {
    const struk = document.getElementById('struk-container');
    const status = document.getElementById('status');
    status.innerText = "⏳ Menyiapkan Gambar...";
    
    html2canvas(struk, {
        scale: 2,
        backgroundColor: "#ffffff",
        logging: false
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = `Struk_LCELL_${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        status.innerText = "✅ Gambar Berhasil Diunduh!";
    }).catch(err => {
        status.innerText = "❌ Gagal mendownload gambar";
        console.error(err);
    });
  }

  function smartCleanNum(str) {
    if (!str) return 0;
    let clean = str.replace(/Rp/gi, '').trim();
    let parts = clean.split('.');
    if (parts.length > 1 && parts[parts.length - 1].length === 2) {
      clean = parts.slice(0, -1).join('');
    }
    return parseInt(clean.replace(/[^\d]/g, "")) || 0;
  }

  const fmtRp = (num) => "Rp" + num.toLocaleString('id-ID');

  document.getElementById('imageInput').addEventListener('change', function() {
    const file = this.files[0];
    if(!file) return;
    document.getElementById('status').innerText = "⏳ Membaca Gambar...";
    
    Tesseract.recognize(file, 'ind+eng').then(({ data: { text } }) => {
      processOCR(text);
      document.getElementById('status').innerText = "✅ Berhasil Di-scan!";
    });
  });

  function processOCR(txt) {
    data = { tipe: 'BCA', nama: '-', tujuan: '-', bank: '-', nominal: 0, admin: 3000, total: 0, waktu: '', idtrx: '-', token: '' };
    const lines = txt.split('\n').map(l => l.trim());

    if (txt.includes("PLN") || txt.includes("Token") || txt.includes("No. Pelanggan")) {
      data.tipe = "PLN";
      data.bank = txt.includes("Prabayar") ? "PLN PRABAYAR" : "PLN POSTPAID";
      data.nama = txt.match(/Nama Pelanggan\s+([^\n]+)/i)?.[1] || "-";
      if (data.nama === "-") {
        for (let line of lines) {
          if (line.includes("*") && line.length > 5 && !line.includes("Ref")) {
            data.nama = line.replace(/[:]/g, "").trim();
            break;
          }
        }
      }
      data.tujuan = txt.match(/(?:No\. Pelanggan|Nomor Meter)\s?[:]?\s?(\d+)/i)?.[1] || "-";
      data.nominal = smartCleanNum(txt.match(/(?:Total Tagihan|Nominal|Total Pembayaran)\s?Rp?\s?([\d.,]+)/i)?.[1]);
      data.idtrx = txt.match(/(?:No\.\s?Pesanan|Ref)\s?[:]?\s?([\d\w]+)/i)?.[1] || "-";
      let tkMatch = txt.match(/(\d{4}\s\d{4}\s\d{4}\s\d{4}\s\d{4})/);
      data.token = tkMatch ? tkMatch[1] : "";
      let tgl = txt.match(/Waktu Pemesanan\s+([\d\s\w]+:\d{2})/i);
      data.waktu = tgl ? tgl[1] : new Date().toLocaleString('id-ID');
    } 
    else if (txt.includes("gopay") || txt.includes("Ditransfer ke")) {
      data.tipe = "GOPAY";
      let targetInfo = txt.match(/Ditransfer ke\s+([^\n]+)/i);
      data.nama = targetInfo ? targetInfo[1].trim() : "-";
      let bankInfo = txt.match(/([A-Z\s]{3,})\s+(\d{5,})/);
      if(bankInfo) { data.bank = bankInfo[1].trim(); data.tujuan = bankInfo[2].trim(); }
      data.nominal = smartCleanNum(txt.match(/Jumlah\s+Rp\s?([\d.,]+)/i)?.[1]);
      data.idtrx = txt.match(/ID Transaksi\s+([A-Z0-9]+)/i)?.[1] || "-";
      let tglG = txt.match(/Tanggal\s+([^\n\r]+)/i);
      let jamG = txt.match(/Waktu\s+(\d{2}:\d{2})/i);
      data.waktu = (tglG ? tglG[1] : "") + " " + (jamG ? jamG[1] : "");
    } 
    else {
      data.tipe = "BCA";
      data.bank = "BCA";
      data.nama = txt.match(/Beneficiary Name\s+([^\n]+)/i)?.[1] || "-";
      data.tujuan = txt.match(/Beneficiary Account\s+([\d\s-]+)/i)?.[1] || "-";
      data.nominal = smartCleanNum(txt.match(/Amount\s+IDR\s?([\d.,]+)/i)?.[1]);
      data.idtrx = txt.match(/Reference No\.\s+([A-Z0-9-]+)/i)?.[1] || "-";
      let tglB = txt.match(/(\d{2}\s+[A-Za-z]{3}\s+\d{4}\s+\d{2}:\d{2}:\d{2})/);
      data.waktu = tglB ? tglB[0] : new Date().toLocaleString('id-ID');
    }
    fillForm();
  }

  function fillForm() {
    document.getElementById('f_tipe').value = data.tipe;
    document.getElementById('f_waktu').value = data.waktu.trim();
    document.getElementById('f_nama').value = data.nama.trim();
    document.getElementById('f_tujuan').value = data.tujuan.trim();
    document.getElementById('f_bank').value = data.bank.trim();
    document.getElementById('f_nominal').value = data.nominal;
    document.getElementById('f_idtrx').value = data.idtrx.trim();
    document.getElementById('f_token').value = data.token;
    updateUI();
  }

  function hitungTotal() {
    const nom = parseInt(document.getElementById('f_nominal').value) || 0;
    const adm = parseInt(document.getElementById('f_admin').value) || 0;
    document.getElementById('f_total').value = fmtRp(nom + adm);
    sync();
  }

  function updateUI() {
    const tipe = document.getElementById('f_tipe').value;
    document.getElementById('box_token').style.display = (tipe === 'PLN') ? 'block' : 'none';
    hitungTotal();
  }

  function sync() {
    const tipe = document.getElementById('f_tipe').value;
    const nom = parseInt(document.getElementById('f_nominal').value) || 0;
    const adm = parseInt(document.getElementById('f_admin').value) || 0;
    const waktu = document.getElementById('f_waktu').value;
    const bank = document.getElementById('f_bank').value;
    const tujuan = document.getElementById('f_tujuan').value;
    const nama = document.getElementById('f_nama').value;
    const idtrx = document.getElementById('f_idtrx').value;
    const token = document.getElementById('f_token').value;

    let labelBank = (tipe === "PLN") ? "TIPE TRANAKSI" : "BANK/ID";
    let tokenSection = (tipe === "PLN" && token) ? `
      <div class="line"></div>
      <div class="text-center">
        <span style="font-size:16px;">NOMOR TOKEN:</span><br>
        <strong style="font-size:20px; letter-spacing:1px;">${token}</strong>
      </div>
    ` : "";

    document.getElementById('p_konten').innerHTML = `
      <div class="flex-space" style="font-size:15px;"><span>TANGGAL:</span> <span>${waktu}</span></div>
      <div class="line"></div>
      <div class="flex-space" style="font-size:20px;"><span>NAMA:</span></div>
      <div class="flex-space" style="font-size:25px; text-align: center;"><span>${nama}</span></div>
      <br>
      <div class="flex-space" style="font-size:15px;"><span>${labelBank}:</span></div>
      <div class="flex-space" style="font-size:20px;"><span>${bank}</span></div>
      <br>
      <div class="flex-space" style="font-size:15px;"><span>NO. TUJUAN/ID:</span></div>
      <div class="flex-space" style="font-size:20px; font-weight: bold;"><span>${tujuan}</span></div>
      
      ${tokenSection}
      <div class="line"></div>
      <div class="flex-space" style="font-size:15px;"><span>NOMINAL:</span></div>
      <div class="flex-space" style="font-size:20px;"><span>${fmtRp(nom)}</span></div>
      <br>
      <div class="flex-space" style="font-size:15px;"><span>BIAYA ADMIN:</span></div>
      <div class="flex-space" style="font-size:20px;"><span>${fmtRp(adm)}</span></div>
      <br>
      <div class="flex-space" style="font-weight:bold; font-size:30px;"><span>TOTAL:</span></div>
      <div class="flex-space" style="font-weight:bold; font-size:30px;"><span>${fmtRp(nom + adm)}</span></div>
      
      <div class="line"></div>
      <div style="font-size:15px; word-break:break-all;"><span>REF: ${idtrx}</span></div>
    `;
  }
  
  document.getElementById('f_admin').value = 3000;
  sync();
  </script>
  </body>
</html>
